# Production Configuration (AWS RDS MySQL)
spring:
  datasource:
    url: jdbc:mysql://${AWS_RDS_ENDPOINT:hotel-project-db.cx7.us-east-1.rds.amazonaws.com}:3306/hotel_db?useSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info
