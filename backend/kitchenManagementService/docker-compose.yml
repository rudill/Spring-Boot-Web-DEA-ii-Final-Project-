version: '3.8'

services:
  kitchen-db:
    image: mysql:8.0
    container_name: kitchen-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kitchen_management_db}
      MYSQL_USER: ${MYSQL_USER:-kitchen_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kitchen_pass}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - kitchen-db-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - kitchen-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kitchen-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitchen-management-service
    depends_on:
      kitchen-db:
        condition: service_healthy
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://kitchen-db:3306/${MYSQL_DATABASE:-kitchen_management_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-kitchen_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-kitchen_pass}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      
      # JPA/Hibernate Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-true}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: true
      
      # Application Configuration
      SERVER_PORT: 8083
      SPRING_APPLICATION_NAME: kitchenManagementService
      
      # Inventory Service Configuration
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://host.docker.internal:8082}
      
      # Logging
      LOGGING_LEVEL_COM_NSBM_GROUP03: ${LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER: TRACE
      
      # Connection Pool
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1200000
      
      # Actuator (for health checks)
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    ports:
      - "${SERVICE_PORT:-8083}:8083"
    networks:
      - kitchen-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  kitchen-db-data:
    driver: local

networks:
  kitchen-network:
    driver: bridge
